name: Build and Deploy to Hostinger Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Static Site
        run: npm run build

      - name: Push static files to hostinger-deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: hostinger-deploy
          folder: out
          clean: true
